<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>搶權 X1 Dashboard</title>
<style>
* { box-sizing: border-box; }
html, body { min-height: 100%; }
body {
  margin: 0; background: #0f1115; color: #e6e8ee;
  font-family: -apple-system, "Segoe UI", "Microsoft JhengHei", sans-serif;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; min-height: 100svh; padding: 16px;
}
.box {
  background: #181b22; border: 1px solid #2a2f3a; border-radius: 12px;
  padding: 28px; width: min(360px, 100%); text-align: center;
  box-shadow: 0 18px 50px rgba(0, 0, 0, .28);
}
h1 { font-size: 22px; margin: 0; }
.intro, .hint { color: #8a90a0; font-size: 13px; line-height: 1.5; }
.intro { margin: 8px 0 0; }
input[type=password] {
  width: 100%; padding: 11px; border-radius: 8px; border: 1px solid #2a2f3a;
  background: #20242d; color: #e6e8ee; font-size: 16px; margin: 18px 0 12px;
}
.remember {
  display: flex; align-items: flex-start; gap: 8px; color: #c6cad4;
  text-align: left; font-size: 13px; margin: 0 0 4px; cursor: pointer;
}
.remember input { margin-top: 3px; }
.hint { text-align: left; margin: 0 0 14px; padding-left: 24px; }
button {
  width: 100%; padding: 11px; border-radius: 8px; border: 0;
  background: #5a91ff; color: #fff; font-size: 15px; font-weight: 600;
  cursor: pointer; min-height: 44px;
}
button:disabled { opacity: .65; cursor: wait; }
.err { color: #ff6b7a; font-size: 13px; line-height: 1.4; min-height: 20px; margin-top: 10px; }
@media (max-width: 340px) {
  body { padding: 10px; }
  .box { padding: 22px 16px; }
}
</style>
</head>
<body>
<main class="box">
  <h1>搶權 X1 Dashboard</h1>
  <p class="intro">輸入密碼以開啟 Dashboard</p>
  <form id="unlock-form">
    <input id="pw" type="password" placeholder="密碼" autocomplete="current-password" autofocus />
    <label class="remember"><input type="checkbox" id="remember" />在此瀏覽器記住 365 天</label>
    <p class="hint" id="remember-hint">只適合自己的私人裝置</p>
    <button type="submit" id="unlock-button">開啟</button>
  </form>
  <div class="err" id="err" role="status" aria-live="polite"></div>
</main>

const DB_NAME = 'exright-dashboard-auth-v1';
const STORE_NAME = 'key_material';
const RECORD_ID = 'pbkdf2-v1';
const REMEMBER_MS = 365 * 24 * 60 * 60 * 1000;
const LEGACY_KEYS = ['exrightpw', 'exright-dashboard-password', 'exright_dashboard_password'];
const err = document.getElementById('err');
const passwordInput = document.getElementById('pw');
const rememberInput = document.getElementById('remember');
const unlockButton = document.getElementById('unlock-button');
const fromB64 = value => Uint8Array.from(atob(value), character => character.charCodeAt(0));

function clearLegacyPasswords() {
  for (const key of LEGACY_KEYS) {
    try { localStorage.removeItem(key); } catch (error) {}
    try { sessionStorage.removeItem(key); } catch (error) {}
  }
}

function readAndClearLegacyPassword() {
  let password = null;
  let remember = false;
  for (const key of LEGACY_KEYS) {
    if (!password) {
      try {
        password = localStorage.getItem(key);
        remember = Boolean(password);
      } catch (error) {}
    }
    if (!password) {
      try { password = sessionStorage.getItem(key); } catch (error) {}
    }
  }
  clearLegacyPasswords();
  return {password, remember};
}

function openAuthDb() {
  return new Promise((resolve, reject) => {
    if (!window.indexedDB) { reject(new Error('IndexedDB unavailable')); return; }
    const request = indexedDB.open(DB_NAME, 1);
    request.onupgradeneeded = () => {
      if (!request.result.objectStoreNames.contains(STORE_NAME)) {
        request.result.createObjectStore(STORE_NAME, {keyPath: 'id'});
      }
    };
    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error || new Error('IndexedDB open failed'));
  });
}

function requestResult(request) {
  return new Promise((resolve, reject) => {
    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error || new Error('IndexedDB request failed'));
  });
}

async function getRememberedKey() {
  const db = await openAuthDb();
  try {
    return await requestResult(db.transaction(STORE_NAME, 'readonly').objectStore(STORE_NAME).get(RECORD_ID));
  } finally { db.close(); }
}

async function saveRememberedKey(keyMaterial) {
  const now = Date.now();
  const db = await openAuthDb();
  try {
    await requestResult(db.transaction(STORE_NAME, 'readwrite').objectStore(STORE_NAME).put({
      id: RECORD_ID, key: keyMaterial, createdAt: now, expiresAt: now + REMEMBER_MS
    }));
  } finally { db.close(); }
}

async function deleteRememberedKey() {
  if (!window.indexedDB) return;
  const db = await openAuthDb();
  try {
    await requestResult(db.transaction(STORE_NAME, 'readwrite').objectStore(STORE_NAME).delete(RECORD_ID));
  } finally { db.close(); }
}

async function importPassword(password) {
  return crypto.subtle.importKey(
    'raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']
  );
}

async function decryptWithKeyMaterial(keyMaterial) {
  const contentKey = await crypto.subtle.deriveKey(
    {name: 'PBKDF2', salt: fromB64(P.salt), iterations: P.iter, hash: 'SHA-256'},
    keyMaterial,
    {name: 'AES-GCM', length: 256},
    false,
    ['decrypt']
  );
  const compressed = await crypto.subtle.decrypt(
    {name: 'AES-GCM', iv: fromB64(P.iv)}, contentKey, fromB64(P.ct)
  );
  if (P.compression !== 'gzip' || typeof DecompressionStream !== 'function') {
    throw new Error('GZIP_UNSUPPORTED');
  }
  const stream = new Blob([compressed]).stream().pipeThrough(new DecompressionStream('gzip'));
  return await new Response(stream).text();
}

function renderDashboard(html) {
  passwordInput.value = '';
  document.open();
  document.write(html);
  document.close();
}

async function unlockFromPassword() {
  const password = passwordInput.value;
  if (!password) { err.textContent = '請輸入密碼'; return; }
  err.textContent = '開啟中…';
  unlockButton.disabled = true;
  try {
    const keyMaterial = await importPassword(password);
    const html = await decryptWithKeyMaterial(keyMaterial);
    clearLegacyPasswords();
    if (rememberInput.checked) {
      try {
        await saveRememberedKey(keyMaterial);
      } catch (storageError) {
        alert('Dashboard 已開啟，但此瀏覽器無法記住裝置；下次請重新輸入密碼。');
      }
    } else {
      await deleteRememberedKey().catch(() => {});
    }
    renderDashboard(html);
  } catch (error) {
    passwordInput.select();
    err.textContent = '密碼不正確';
  } finally {
    unlockButton.disabled = false;
  }
}

async function tryLegacyPassword() {
  const legacy = readAndClearLegacyPassword();
  if (!legacy.password) return false;
  try {
    const keyMaterial = await importPassword(legacy.password);
    const html = await decryptWithKeyMaterial(keyMaterial);
    if (legacy.remember) await saveRememberedKey(keyMaterial);
    renderDashboard(html);
    return true;
  } catch (error) {
    await deleteRememberedKey().catch(() => {});
    return false;
  }
}

async function autoUnlock() {
  if (!window.crypto || !crypto.subtle) {
    rememberInput.disabled = true;
    unlockButton.disabled = true;
    err.textContent = '此瀏覽器不支援安全解密，請更新瀏覽器後再試。';
    clearLegacyPasswords();
    return;
  }
  if (P.compression !== 'gzip' || typeof DecompressionStream !== 'function') {
    rememberInput.disabled = true;
    unlockButton.disabled = true;
    err.textContent = '此瀏覽器不支援安全解壓縮，請更新瀏覽器後再試。';
    clearLegacyPasswords();
    return;
  }
  if (!window.indexedDB) {
    rememberInput.disabled = true;
    document.getElementById('remember-hint').textContent = '此瀏覽器不支援記住裝置，仍可輸入密碼開啟';
    const migrated = await tryLegacyPassword();
    if (!migrated) passwordInput.focus();
    return;
  }
  try {
    const saved = await getRememberedKey();
    if (saved) {
      if (!saved.expiresAt || Date.now() >= saved.expiresAt) {
        await deleteRememberedKey();
        err.textContent = '裝置記憶已到期，請重新輸入密碼';
      } else {
        err.textContent = '正在使用此裝置記憶開啟…';
        try {
          const html = await decryptWithKeyMaterial(saved.key);
          renderDashboard(html);
          return;
        } catch (error) {
          await deleteRememberedKey();
          err.textContent = '密碼已更新或裝置記憶失效，請重新輸入密碼';
        }
      }
    }
  } catch (error) {
    rememberInput.disabled = true;
    document.getElementById('remember-hint').textContent = '無法使用裝置記憶，仍可輸入密碼開啟';
  }
  const migrated = await tryLegacyPassword();
  if (!migrated) passwordInput.focus();
}

document.getElementById('unlock-form').addEventListener('submit', event => {
  event.preventDefault();
  unlockFromPassword();
});
autoUnlock();
</script>
</body>
</html>
